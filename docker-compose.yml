services:
  db:
    image: mysql:8.0
    container_name: energy_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "@Ken160123"
      MYSQL_DATABASE: energy_db
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
